<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Relvia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --background:#0a0806;
  --surface:rgba(20,16,11,.78);
  --surface-light:#1c150d;
  --glass:rgba(18,14,10,.6);
  --border:#2a2018;
  --border-soft:#1c1610;

  --gold-start:#f2c766;
  --gold-end:#b9832f;
  --gold:#e0b158;

  --text:#f5f1ea;
  --muted:#a89e8f;
  --muted-soft:#6b6255;
  --danger:#e0574f;

  --radius-lg:24px;
  --radius-md:16px;

  --font-display:"Playfair Display",serif;
  --font-body:"Inter",sans-serif;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:var(--font-body); }
html, body{ height:100%; }
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -5%, rgba(217,169,75,.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 20%, rgba(185,131,47,.06), transparent 55%),
    var(--background);
  color:var(--text);
  display:flex; align-items:center; justify-content:center;
  padding:24px;
}
button, input{ font-family:inherit; }
button{ cursor:pointer; border:none; background:none; color:inherit; font-size:inherit; }

.wrap{ width:420px; max-width:100%; }

/* Brand */
.brand{ display:flex; flex-direction:column; align-items:center; gap:14px; margin-bottom:34px; }
.brand-badge{
  width:56px; height:56px; border-radius:50%;
  background:#000;
  background-image:radial-gradient(circle at 32% 22%, rgba(242,199,102,.28), transparent 65%);
  border:1.5px solid var(--gold-end);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-style:italic; font-weight:700; font-size:28px;
  color:var(--gold-start);
}
.brand-name{ font-family:var(--font-display); font-weight:700; font-size:24px; }
.brand-tagline{ font-size:11px; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; text-align:center; }

/* Card */
.card{
  background:var(--glass); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:8px; backdrop-filter:blur(10px);
}

.tabs{ display:flex; gap:4px; margin-bottom:4px; }
.tab{
  flex:1; text-align:center; padding:14px; border-radius:16px;
  font-size:14px; font-weight:700; color:var(--muted); transition:.2s;
}
.tab.active{
  background:linear-gradient(135deg,var(--gold-start),var(--gold-end));
  color:#000;
}
.tab:not(.active):hover{ color:white; }

.panel{ padding:26px 22px 22px; display:none; }
.panel.active{ display:block; }

.panel h2{ font-family:var(--font-display); font-size:24px; font-weight:600; margin-bottom:6px; }
.panel p.sub{ color:var(--muted); font-size:13.5px; margin-bottom:22px; }

.field{ margin-bottom:14px; }
.field label{ font-size:12px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:.3px; }
.field input{
  width:100%; background:var(--surface-light); border:1px solid var(--border); border-radius:12px;
  padding:12px 14px; color:white; font-size:14px; transition:border-color .2s;
}
.field input:focus{ outline:none; border-color:var(--gold); }
.field-row{ display:flex; gap:10px; }
.field-row .field{ flex:1; }

.submit-btn{
  width:100%; margin-top:6px;
  background:linear-gradient(135deg,var(--gold-start),var(--gold-end));
  color:#000; padding:13px; border-radius:14px; font-weight:800; font-size:14.5px;
  transition:opacity .2s;
}
.submit-btn:disabled{ opacity:.5; cursor:not-allowed; }
.submit-btn:not(:disabled):hover{ opacity:.88; }

.form-error{
  background:rgba(224,87,79,.1); border:1px solid rgba(224,87,79,.35); color:#f2a8a3;
  padding:10px 13px; border-radius:12px; font-size:13px; margin-bottom:14px; display:none;
}
.form-error.show{ display:block; }

.form-success{
  background:rgba(217,169,75,.1); border:1px solid var(--gold-end); color:var(--gold-start);
  padding:14px; border-radius:12px; font-size:13.5px; margin-bottom:14px; display:none; line-height:1.6;
}
.form-success.show{ display:block; }

.ecosystem-note{
  margin-top:22px; text-align:center; font-size:12.5px; color:var(--muted-soft); line-height:1.6;
}
.ecosystem-note strong{ color:var(--muted); }
</style>
</head>
<body>

<div class="wrap">

  <div class="brand">
    <div class="brand-badge">R</div>
    <div class="brand-name">Relvia</div>
    <div class="brand-tagline">One Account · Every Stage of Relvia</div>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tabLogin">Sign in</div>
      <div class="tab" id="tabSignup">Create account</div>
    </div>

    <!-- LOGIN PANEL -->
    <div class="panel active" id="panelLogin">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your Relvia account.</p>

      <div class="form-error" id="loginError"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" autocomplete="email" placeholder="you@email.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••">
      </div>

      <button class="submit-btn" id="loginSubmit">Sign in</button>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="panel" id="panelSignup">
      <h2>Create your account</h2>
      <p class="sub">One Relvia account unlocks Social, Music, Studios &amp; Live.</p>

      <div class="form-error" id="signupError"></div>
      <div class="form-success" id="signupSuccess"></div>

      <div class="field">
        <label>Display name</label>
        <input type="text" id="signupDisplayName" autocomplete="name" placeholder="Your name">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="signupUsername" autocomplete="username" placeholder="username">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" autocomplete="email" placeholder="you@email.com">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Password</label>
          <input type="password" id="signupPassword" autocomplete="new-password" placeholder="••••••••">
        </div>
        <div class="field">
          <label>Confirm</label>
          <input type="password" id="signupConfirm" autocomplete="new-password" placeholder="••••••••">
        </div>
      </div>

      <button class="submit-btn" id="signupSubmit">Create account</button>
    </div>
  </div>

  <div class="ecosystem-note">
    <strong>Film · Television · Music · Live · Creators.</strong><br>
    One ecosystem, one login, endless possibilities.
  </div>

</div>

<script>

const SUPABASE_URL = "https://nqcbhpqzzwjgkusfbexo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xY2JocHF6endqZ2t1c2ZiZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjY1NjEsImV4cCI6MjA5ODk0MjU2MX0.BphyIGT-X9ctYVvfYXw_ldo5XGguNv5j-zDiGBPrCVU";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const FEED_URL = "/social/social.html";

// ==========================================
// IF ALREADY LOGGED IN, SKIP STRAIGHT TO SOCIAL
// ==========================================
async function checkExistingSession(){
  try {
    const { data } = await supabaseClient.auth.getSession();
    if (data && data.session){
      window.location.href = FEED_URL;
    }
  } catch (err){
    console.error("Session check failed:", err);
  }
}
checkExistingSession();

// ==========================================
// TAB SWITCHING
// ==========================================
const tabLogin = document.getElementById("tabLogin");
const tabSignup = document.getElementById("tabSignup");
const panelLogin = document.getElementById("panelLogin");
const panelSignup = document.getElementById("panelSignup");

tabLogin.addEventListener("click", () => {
  tabLogin.classList.add("active");
  tabSignup.classList.remove("active");
  panelLogin.classList.add("active");
  panelSignup.classList.remove("active");
});

tabSignup.addEventListener("click", () => {
  tabSignup.classList.add("active");
  tabLogin.classList.remove("active");
  panelSignup.classList.add("active");
  panelLogin.classList.remove("active");
});

// ==========================================
// LOGIN
// ==========================================
const loginError = document.getElementById("loginError");
const loginSubmit = document.getElementById("loginSubmit");

loginSubmit.addEventListener("click", async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  loginError.classList.remove("show");

  if (!email || !password){
    loginError.textContent = "Enter your email and password.";
    loginError.classList.add("show");
    return;
  }

  loginSubmit.disabled = true;
  loginSubmit.textContent = "Signing in...";

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  loginSubmit.disabled = false;
  loginSubmit.textContent = "Sign in";

  if (error){
    loginError.textContent = error.message || "Couldn't sign in. Check your details and try again.";
    loginError.classList.add("show");
    return;
  }

  window.location.href = FEED_URL;
});

// ==========================================
// SIGNUP
// ==========================================
const signupError = document.getElementById("signupError");
const signupSuccess = document.getElementById("signupSuccess");
const signupSubmit = document.getElementById("signupSubmit");

signupSubmit.addEventListener("click", async () => {
  const display_name = document.getElementById("signupDisplayName").value.trim();
  const username = document.getElementById("signupUsername").value.trim().toLowerCase();
  const email = document.getElementById("signupEmail").value.trim();
  const password = document.getElementById("signupPassword").value;
  const confirm = document.getElementById("signupConfirm").value;

  signupError.classList.remove("show");
  signupSuccess.classList.remove("show");

  if (!display_name || !username || !email || !password){
    signupError.textContent = "Fill in every field to continue.";
    signupError.classList.add("show");
    return;
  }
  if (!/^[a-z0-9_]+$/.test(username)){
    signupError.textContent = "Usernames can only use lowercase letters, numbers, and underscores.";
    signupError.classList.add("show");
    return;
  }
  if (password.length < 6){
    signupError.textContent = "Password must be at least 6 characters.";
    signupError.classList.add("show");
    return;
  }
  if (password !== confirm){
    signupError.textContent = "Passwords don't match.";
    signupError.classList.add("show");
    return;
  }

  signupSubmit.disabled = true;
  signupSubmit.textContent = "Creating account...";

  // display_name/username are passed as auth metadata — the profiles-table
  // trigger is expected to read these off the new auth.users row.
  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password,
    options: {
      data: { display_name, username }
    }
  });

  signupSubmit.disabled = false;
  signupSubmit.textContent = "Create account";

  if (error){
    signupError.textContent = error.message || "Couldn't create your account. Try again.";
    signupError.classList.add("show");
    return;
  }

  if (data && data.session){
    // Email confirmation is off — the user is signed in immediately.
    window.location.href = FEED_URL;
    return;
  }

  // Email confirmation is required before a session exists.
  signupSuccess.textContent = "Account created! Check your email to confirm, then sign in.";
  signupSuccess.classList.add("show");
});

</script>
</body>
</html>
