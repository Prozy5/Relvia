<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relvia Social</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{

--bg:#050505;
--surface:#101010;
--surface2:#171717;
--gold:#D4AF37;
--text:#ffffff;
--muted:#9c9c9c;
--border:rgba(255,255,255,.08);

}

body{

background:var(--bg);

color:var(--text);

overflow-x:hidden;

}

/* NAVBAR */

nav{

position:fixed;

top:0;
left:0;
right:0;

height:78px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 30px;

background:rgba(5,5,5,.9);

backdrop-filter:blur(18px);

border-bottom:1px solid var(--border);

z-index:999;

}

.logo{

font-size:28px;

font-weight:900;

letter-spacing:1px;

color:var(--gold);

}

.logo span{

color:white;

}

.nav-right{

display:flex;

align-items:center;

gap:15px;

}

.search{

width:300px;

padding:12px 18px;

border:none;

outline:none;

background:#151515;

color:white;

border-radius:50px;

}

.icon{

width:42px;

height:42px;

background:#151515;

display:flex;

justify-content:center;

align-items:center;

border-radius:50%;

cursor:pointer;

transition:.25s;

}

.icon:hover{

background:var(--gold);

color:black;

}

.profile{

background:var(--gold);

}

/* STORIES */

.stories{

margin-top:78px;

display:flex;

gap:18px;

padding:20px 30px;

overflow-x:auto;

border-bottom:1px solid var(--border);

}

.story{

text-align:center;

min-width:74px;

cursor:pointer;

}

.story-circle{

width:68px;

height:68px;

border-radius:50%;

border:2px solid var(--gold);

background:#202020;

margin:auto;

}

.story p{

margin-top:8px;

font-size:12px;

}

/* MAIN */

.wrapper{

display:grid;

grid-template-columns:2fr 360px;

gap:30px;

padding:30px;

}

/* CREATE POST */

.create-post{

background:var(--surface);

border-radius:22px;

padding:22px;

border:1px solid var(--border);

}

.create-top{

display:flex;

gap:15px;

align-items:flex-start;

}

.avatar{

width:52px;

height:52px;

border-radius:50%;

background:#2b2b2b;

}

#createText{

flex:1;

height:90px;

resize:none;

background:var(--surface2);

border:none;

outline:none;

padding:16px;

border-radius:16px;

color:white;

font-size:15px;

}

.create-bottom{

margin-top:18px;

display:flex;

justify-content:space-between;

align-items:center;

}

.actions{

display:flex;

gap:10px;

}

.action{

padding:10px 16px;

background:#191919;

border-radius:12px;

cursor:pointer;

transition:.2s;

}

.action:hover{

background:#252525;

}

#publishPost{

padding:12px 30px;

border:none;

background:var(--gold);

color:black;

font-weight:700;

border-radius:50px;

cursor:pointer;

}

/* FEED */

.feed{

margin-top:25px;

display:flex;

flex-direction:column;

gap:22px;

}

#feed{

display:flex;

flex-direction:column;

gap:22px;

}

/* SIDEBAR */

.sidebar{

display:flex;

flex-direction:column;

gap:20px;

}

.card{

background:var(--surface);

border-radius:22px;

padding:22px;

border:1px solid var(--border);

}

.card h2{

font-size:20px;

margin-bottom:18px;

color:var(--gold);

}

/* SCROLLBAR */

::-webkit-scrollbar{

width:7px;

height:7px;

}

::-webkit-scrollbar-thumb{

background:var(--gold);

border-radius:30px;

}

::-webkit-scrollbar-track{

background:#111;

}

/* MOBILE */

@media(max-width:1050px){

.wrapper{

grid-template-columns:1fr;

}

.sidebar{

display:none;

}

}

@media(max-width:760px){

.search{

display:none;

}

.wrapper{

padding:20px;

}

nav{

padding:0 18px;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">

RELVIA <span>SOCIAL</span>

</div>

<div class="nav-right">

<input
id="searchBar"
class="search"
placeholder="Search">

<div class="icon">💬</div>

<div class="icon">🔔</div>

<div class="icon profile"></div>

</div>

</nav>

<div
class="stories"
id="stories">

<!-- Stories loaded from Supabase -->

</div>

<div class="wrapper">

<div>

<div class="create-post">

<div class="create-top">

<div
class="avatar"
id="profileAvatar">

</div>

<textarea
id="createText"
placeholder="What's happening?"></textarea>

</div>

<div class="create-bottom">

<div class="actions">

<div class="action">📷</div>

<div class="action">🎥</div>

<div class="action">🎵</div>

<div class="action">📊</div>

</div>

<button id="publishPost">

Post

</button>

</div>

</div>

<div class="feed">

<div id="feed">

<!-- Posts loaded from Supabase -->

</div>

</div>

</div>

<div class="sidebar">

<div class="card">

<h2>Trending</h2>

<div id="trending"></div>

</div>

<div class="card">

<h2>Suggested</h2>

<div id="suggestedUsers"></div>

</div>

<div class="card">

<h2>Spaces</h2>

<div id="spaces"></div>

</div>

</div>

</div>
<!-- ===========================
FLOATING CREATE BUTTON
=========================== -->

<div class="fab" id="fab">
+
</div>

<!-- ===========================
NOTIFICATION PANEL
=========================== -->

<div class="notification-panel" id="notificationPanel">

<h2>Notifications</h2>

<div id="notifications">

<!-- Loaded From Supabase -->

</div>

</div>

<!-- ===========================
BOTTOM NAVIGATION
=========================== -->

<footer class="bottom-nav">

<div class="nav-button active" id="homeBtn">
🏠
<span>Home</span>
</div>

<div class="nav-button" id="exploreBtn">
🔍
<span>Explore</span>
</div>

<div class="nav-button" id="createBtn">
➕
<span>Create</span>
</div>

<div class="nav-button" id="spacesBtn">
🪐
<span>Spaces</span>
</div>

<div class="nav-button" id="messagesBtn">
💬
<span>Messages</span>
</div>

<div class="nav-button" id="profileBtn">
👤
<span>Profile</span>
</div>

</footer>

<style>

/* FAB */

.fab{

position:fixed;

right:35px;

bottom:95px;

width:68px;

height:68px;

border-radius:50%;

background:var(--gold);

color:black;

display:flex;

justify-content:center;

align-items:center;

font-size:38px;

font-weight:800;

cursor:pointer;

box-shadow:0 18px 40px rgba(212,175,55,.35);

transition:.3s;

z-index:998;

}

.fab:hover{

transform:translateY(-6px);

}

/* NOTIFICATION PANEL */

.notification-panel{

position:fixed;

top:90px;

right:25px;

width:340px;

background:var(--surface);

border:1px solid var(--border);

border-radius:22px;

padding:22px;

display:none;

z-index:999;

}

.notification-panel h2{

color:var(--gold);

margin-bottom:18px;

}

/* BOTTOM NAV */

.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:78px;

background:#0c0c0c;

border-top:1px solid var(--border);

display:flex;

justify-content:space-around;

align-items:center;

z-index:997;

backdrop-filter:blur(18px);

}

.nav-button{

display:flex;

flex-direction:column;

align-items:center;

gap:4px;

font-size:22px;

cursor:pointer;

color:#9d9d9d;

transition:.25s;

}

.nav-button span{

font-size:11px;

}

.nav-button:hover{

color:var(--gold);

}

.nav-button.active{

color:var(--gold);

}

</style>

<script>

/*
===============================
RELVIA SOCIAL
===============================
Everything below is Supabase-ready.
Nothing is hardcoded.
*/

const feed=document.getElementById("feed");

const stories=document.getElementById("stories");

const trending=document.getElementById("trending");

const suggestedUsers=document.getElementById("suggestedUsers");

const spaces=document.getElementById("spaces");

const notifications=document.getElementById("notifications");

/* -------------------------------- */

async function loadFeed(){

feed.innerHTML="";

}

/* -------------------------------- */

async function loadStories(){

stories.innerHTML="";

}

/* -------------------------------- */

async function loadTrending(){

trending.innerHTML="";

}

/* -------------------------------- */

async function loadSuggested(){

suggestedUsers.innerHTML="";

}

/* -------------------------------- */

async function loadSpaces(){

spaces.innerHTML="";

}

/* -------------------------------- */

async function loadNotifications(){

notifications.innerHTML="";

}

/* -------------------------------- */

async function initialize(){

await loadStories();

await loadFeed();

await loadTrending();

await loadSuggested();

await loadSpaces();

await loadNotifications();

}

initialize();

/* Notification Drawer */

document.querySelectorAll(".icon")[1]

.addEventListener("click",()=>{

const panel=document.getElementById("notificationPanel");

panel.style.display=

panel.style.display==="block"

? "none"

: "block";

});

/* Create Button */

document.getElementById("publishPost")

.addEventListener("click",()=>{

console.log("Publish Post");

});

/* Floating Button */

document.getElementById("fab")

.onclick=()=>{

document.getElementById("createText").focus();

};

</script>

</body>

</html>
