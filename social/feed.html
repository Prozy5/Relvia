<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relvia Social</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

:root{

--bg:#050505;
--surface:#101010;
--surface2:#181818;
--border:#232323;

--gold:#D4AF37;

--text:#ffffff;
--muted:#8a8a8a;

--radius:24px;

}

html{

scroll-behavior:smooth;

}

body{

background:var(--bg);

color:var(--text);

overflow-x:hidden;

}

body::-webkit-scrollbar{

width:8px;

}

body::-webkit-scrollbar-thumb{

background:var(--gold);

border-radius:100px;

}

a{

text-decoration:none;

color:inherit;

}

button{

font:inherit;

cursor:pointer;

}

img{

display:block;

max-width:100%;

}

input,
textarea{

font:inherit;

outline:none;

}



/* ==========================================
NAVBAR
========================================== */

nav{

position:fixed;

top:0;
left:0;
right:0;

height:74px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

background:rgba(5,5,5,.90);

backdrop-filter:blur(20px);

border-bottom:1px solid var(--border);

z-index:9999;

}

.logo{

font-size:24px;

font-weight:800;

letter-spacing:2px;

}

.logo span{

color:var(--gold);

}

.search{

width:420px;

height:46px;

border:none;

border-radius:999px;

padding:0 18px;

background:#191919;

color:white;

transition:.25s;

}

.search:focus{

background:#202020;

}

.right-nav{

display:flex;

align-items:center;

gap:14px;

}

.icon-btn{

width:44px;

height:44px;

display:flex;

justify-content:center;

align-items:center;

border-radius:50%;

background:#171717;

transition:.25s;

}

.icon-btn:hover{

background:var(--gold);

color:black;

}

.profile-avatar{

width:44px;

height:44px;

border-radius:50%;

overflow:hidden;

background:#252525;

display:flex;

justify-content:center;

align-items:center;

font-weight:700;

}



/* ==========================================
LAYOUT
========================================== */

.app{

max-width:1700px;

margin:auto;

padding-top:95px;

padding-left:28px;

padding-right:28px;

display:grid;

grid-template-columns:

280px
1fr
340px;

gap:26px;

}

.left-sidebar{

position:sticky;

top:94px;

height:calc(100vh - 110px);

}

.feed{

width:100%;

}

.right-sidebar{

position:sticky;

top:94px;

height:calc(100vh - 110px);

}



/* ==========================================
CARDS
========================================== */

.card{

background:var(--surface);

border:1px solid var(--border);

border-radius:var(--radius);

padding:22px;

margin-bottom:22px;

}



/* ==========================================
STORIES
========================================== */

.story-row{

display:flex;

gap:18px;

overflow-x:auto;

padding-bottom:6px;

}

.story-row::-webkit-scrollbar{

display:none;

}

.story{

min-width:74px;

text-align:center;

}

.story-ring{

width:70px;

height:70px;

margin:auto;

border-radius:50%;

padding:2px;

background:linear-gradient(

135deg,

var(--gold),

#8d6b16

);

}

.story-inner{

width:100%;

height:100%;

border-radius:50%;

background:#222;

}

.story-name{

font-size:12px;

margin-top:8px;

color:var(--muted);

}



/* ==========================================
CREATE POST
========================================== */

.create{

display:flex;

gap:16px;

}

.create-avatar{

width:52px;

height:52px;

border-radius:50%;

background:#252525;

flex-shrink:0;

}

.create-main{

flex:1;

}

#createPostInput{

width:100%;

height:90px;

resize:none;

border:none;

background:transparent;

color:white;

font-size:17px;

}

#createPostInput::placeholder{

color:var(--muted);

}

.create-footer{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:18px;

}

.create-tools{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.tool{

padding:10px 14px;

border-radius:14px;

background:var(--surface2);

transition:.25s;

}

.tool:hover{

background:#242424;

}

.publish{

padding:12px 24px;

border:none;

background:var(--gold);

color:black;

font-weight:700;

border-radius:16px;

}

/* ==========================================
POSTS
========================================== */

.post{

overflow:hidden;

transition:.25s;

}

.post:hover{

transform:translateY(-2px);

}

.post-header{

display:flex;

align-items:center;

justify-content:space-between;

margin-bottom:18px;

}

.post-user{

display:flex;

align-items:center;

gap:14px;

}

.post-avatar{

width:52px;

height:52px;

border-radius:50%;

overflow:hidden;

background:#252525;

display:flex;

align-items:center;

justify-content:center;

font-weight:700;

}

.post-info h3{

font-size:16px;

font-weight:700;

display:flex;

align-items:center;

gap:8px;

}

.verified{

display:inline-flex;

align-items:center;

justify-content:center;

padding:4px 8px;

border-radius:999px;

background:var(--gold);

color:black;

font-size:11px;

font-weight:700;

}

.post-info p{

margin-top:4px;

font-size:13px;

color:var(--muted);

}

.more{

width:40px;

height:40px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

background:var(--surface2);

transition:.25s;

}

.more:hover{

background:#262626;

}

.post-text{

font-size:16px;

line-height:30px;

margin-bottom:18px;

white-space:pre-wrap;

word-break:break-word;

}

.post-media{

border-radius:22px;

overflow:hidden;

background:#181818;

}

.post-media img{

width:100%;

display:block;

}

.post-media video{

width:100%;

display:block;

}

.post-actions{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:18px;

padding-top:18px;

border-top:1px solid var(--border);

}

.action-group{

display:flex;

align-items:center;

gap:12px;

}

.action{

display:flex;

align-items:center;

gap:8px;

padding:10px 14px;

border-radius:14px;

background:transparent;

transition:.25s;

cursor:pointer;

user-select:none;

}

.action:hover{

background:var(--surface2);

}

.action span{

font-size:14px;

color:var(--muted);

}



/* ==========================================
SIDEBAR
========================================== */

.section-title{

font-size:18px;

font-weight:700;

margin-bottom:18px;

}

.trend{

padding:14px 0;

border-bottom:1px solid var(--border);

}

.trend:last-child{

border-bottom:none;

}

.trend h4{

font-size:15px;

font-weight:600;

}

.trend p{

margin-top:6px;

font-size:13px;

color:var(--muted);

}

.suggest{

display:flex;

align-items:center;

justify-content:space-between;

padding:14px 0;

border-bottom:1px solid var(--border);

}

.suggest:last-child{

border-bottom:none;

}

.suggest-user{

display:flex;

align-items:center;

gap:12px;

}

.follow-btn{

padding:10px 18px;

border:none;

border-radius:14px;

background:var(--gold);

color:black;

font-weight:700;

}



/* ==========================================
RESPONSIVE
========================================== */

@media(max-width:1350px){

.app{

grid-template-columns:1fr;

}

.left-sidebar,
.right-sidebar{

display:none;

}

}

@media(max-width:850px){

nav{

padding:0 16px;

}

.search{

display:none;

}

.app{

padding-left:14px;

padding-right:14px;

padding-top:88px;

}

.card{

padding:18px;

border-radius:20px;

}

.post-actions{

flex-wrap:wrap;

gap:10px;

}

.create-footer{

flex-direction:column;

align-items:flex-start;

gap:16px;

}

.publish{

width:100%;

}

}

</style>

<body>

<nav>

<div class="logo">

RELVIA <span>SOCIAL</span>

</div>

<input
class="search"
placeholder="Search Relvia">

<div class="right-nav">

<div class="icon-btn"
id="messagesButton">

Messages

</div>

<div class="icon-btn"
id="notificationsButton">

Alerts

</div>

<div
class="profile-avatar"
id="profileAvatar">

</div>

</div>

</nav>

<div class="app">

<div class="left-sidebar">

<div class="card">

<h3 class="section-title">

Navigation

</h3>

</div>

</div>

<div class="feed">

<div class="card">

<div
class="story-row"
id="storiesContainer">

</div>

</div>

<div class="card">

<div class="create">

<div
class="create-avatar"
id="createAvatar">

</div>

<div class="create-main">

<textarea

id="createPostInput"

placeholder="Share something with Relvia...">

</textarea>

<div class="create-footer">

<div class="create-tools">

<div class="tool">

Photo

</div>

<div class="tool">

Video

</div>

<div class="tool">

Poll

</div>

<div class="tool">

Event

</div>

</div>

<button
class="publish"
id="publishPost">

Post

</button>

</div>

</div>

</div>

</div>

<div id="feedContainer">
<!-- POSTS LOAD HERE -->

</div>

</div>

<!-- RIGHT SIDEBAR -->

<div class="right-sidebar">

<div class="sidebar-card">

<h3 class="sidebar-title">

Trending

</h3>

<div id="trendingContainer"></div>

</div>

<div class="sidebar-card">

<h3 class="sidebar-title">

Suggested Creators

</h3>

<div id="suggestedContainer"></div>

</div>

</div>

</div>

<script>

const SUPABASE_URL="YOUR_SUPABASE_URL";

const SUPABASE_ANON_KEY="YOUR_SUPABASE_ANON_KEY";

const supabaseClient=supabase.createClient(

SUPABASE_URL,

SUPABASE_ANON_KEY

);

let currentUser=null;

let profile=null;
// ==========================================
// AUTH
// ==========================================

async function initialize(){

const {data,error}=await supabaseClient.auth.getUser();

if(error){

console.error(error);

return;

}

if(!data.user){

window.location.href="login.html";

return;

}

currentUser=data.user;

await loadProfile();

await loadStories();

await loadFeed();

await loadTrending();

await loadSuggested();

listenForRealtime();

}



// ==========================================
// PROFILE
// ==========================================

async function loadProfile(){

const {data,error}=await supabaseClient

.from("profiles")

.select("*")

.eq("id",currentUser.id)

.single();

if(error){

console.error(error);

return;

}

profile=data;

const avatar=document.getElementById("profileAvatar");

const createAvatar=document.getElementById("createAvatar");

const avatarHTML=data.avatar_url

? `<img src="${data.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`

: `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:700;">${(data.display_name||"R").charAt(0)}</div>`;

avatar.innerHTML=avatarHTML;

createAvatar.innerHTML=avatarHTML;

}



// ==========================================
// STORIES
// ==========================================

async function loadStories(){

const {data,error}=await supabaseClient

.from("profiles")

.select("*")

.order("follower_count",{ascending:false})

.limit(15);

if(error){

console.error(error);

return;

}

const container=document.getElementById("storiesContainer");

container.innerHTML="";

data.forEach(user=>{

container.innerHTML+=`

<div class="story">

<div class="story-ring">

<div class="story-inner">

${user.avatar_url?

`<img src="${user.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`

:""}

</div>

</div>

<div class="story-name">

${user.display_name}

</div>

</div>

`;

});

}



// ==========================================
// FEED
// ==========================================

async function loadFeed(){

const {data,error}=await supabaseClient

.from("social_feed")

.select("*")

.order("created_at",{ascending:false});

if(error){

console.error(error);

return;

}

const container=document.getElementById("feedContainer");

container.innerHTML="";

for(const post of data){

container.innerHTML+=`

<div class="post">

<div class="post-header">

<div class="post-user">

<div class="post-avatar">

${post.avatar_url?

`<img src="${post.avatar_url}">`

:""}

</div>

<div class="post-info">

<h3>

${post.display_name}

${post.verified?

`<span class="verified">Verified</span>`

:""}

</h3>

<p>

@${post.username}

</p>

</div>

</div>

<div class="more-btn">

•••

</div>

</div>

<div class="post-caption">

${post.caption||""}

</div>

<div

class="post-media"

id="media-${post.id}">

</div>

<div class="post-footer">

<div class="action-bar">

<div

class="action"

onclick="toggleLike('${post.id}')">

Like

<span class="action-count">

${post.likes_count}

</span>

</div>

<div class="action">

Comment

<span class="action-count">

${post.comments_count}

</span>

</div>

<div class="action">

Repost

<span class="action-count">

${post.reposts_count}

</span>

</div>

</div>

</div>

</div>

`;

await loadMedia(post.id);

}

}
// ==========================================
// LOAD MEDIA
// ==========================================

async function loadMedia(postId){

const {data,error}=await supabaseClient

.from("social_post_media")

.select("*")

.eq("post_id",postId)

.order("position");

if(error)return;

const container=document.getElementById(`media-${postId}`);

if(!container)return;

if(data.length===0){

container.style.display="none";

return;

}

container.innerHTML="";

data.forEach(media=>{

const url=supabaseClient.storage

.from("post-media")

.getPublicUrl(media.storage_path)

.data.publicUrl;

if(media.media_type==="image"){

container.innerHTML+=`

<img src="${url}" loading="lazy">

`;

}

if(media.media_type==="video"){

container.innerHTML+=`

<video

controls

playsinline

preload="metadata">

<source src="${url}">

</video>

`;

}

});

}



// ==========================================
// LIKE
// ==========================================

async function toggleLike(postId){

const {data:user}=await supabaseClient.auth.getUser();

const userId=user.user.id;

const {data:existing}=await supabaseClient

.from("post_likes")

.select("id")

.eq("post_id",postId)

.eq("user_id",userId)

.maybeSingle();

if(existing){

await supabaseClient

.from("post_likes")

.delete()

.eq("id",existing.id);

}else{

await supabaseClient

.from("post_likes")

.insert({

post_id:postId,

user_id:userId

});

}

await loadFeed();

}



// ==========================================
// PUBLISH POST
// ==========================================

document

.getElementById("publishPost")

.addEventListener(

"click",

publishPost

);

async function publishPost(){

const caption=document

.getElementById("createPostInput")

.value

.trim();

if(caption==="")return;

const {error}=await supabaseClient

.from("social_posts")

.insert({

user_id:currentUser.id,

caption:caption

});

if(error){

console.error(error);

return;

}

document

.getElementById("createPostInput")

.value="";

await loadFeed();

}



// ==========================================
// TRENDING
// ==========================================

async function loadTrending(){

const {data}=await supabaseClient

.from("social_feed")

.select("caption")

.limit(8);

const container=document

.getElementById("trendingContainer");

container.innerHTML="";

data.forEach(post=>{

container.innerHTML+=`

<div class="trending-item">

<h4>

${(post.caption||"")

.substring(0,45)}

</h4>

<p>

Trending on Relvia

</p>

</div>

`;

});

}
// ==========================================
// SUGGESTED CREATORS
// ==========================================

async function loadSuggested(){

const {data,error}=await supabaseClient

.from("profiles")

.select("*")

.neq("id",currentUser.id)

.order("follower_count",{ascending:false})

.limit(5);


if(error){

console.error(error);

return;

}


const container=document.getElementById("suggestedContainer");

container.innerHTML="";


data.forEach(user=>{


container.innerHTML+=`

<div class="suggest">

<div class="suggest-user">


<div class="post-avatar">

${user.avatar_url

?

`<img src="${user.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`

:

user.display_name.charAt(0)

}

</div>


<div>

<h4>

${user.display_name}

</h4>


<p style="color:#8a8a8a;font-size:13px">

@${user.username}

</p>


</div>


</div>


<button class="follow-btn">

Follow

</button>


</div>

`;


});


}




// ==========================================
// REALTIME UPDATES
// ==========================================

function listenForRealtime(){


supabaseClient

.channel("social-feed")

.on(

"postgres_changes",

{

event:"*",

schema:"public",

table:"social_posts"

},

(payload)=>{


console.log("Feed Updated",payload);


loadFeed();


}

)


.subscribe();


}



// ==========================================
// SEARCH
// ==========================================

document

.querySelector(".search")

.addEventListener(

"input",

async(e)=>{


const value=e.target.value.trim();


if(value.length < 2)return;



const {data,error}=await supabaseClient

.from("profiles")

.select("*")

.ilike(

"display_name",

`%${value}%`

)

.limit(5);



console.log(data);


}

);




// ==========================================
// START APP
// ==========================================

initialize();
