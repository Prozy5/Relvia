<script>


const SUPABASE_URL = "https://nqcbhpqzzwjgkusfbexo.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xY2JocHF6endqZ2t1c2ZiZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjY1NjEsImV4cCI6MjA5ODk0MjU2MX0.BphyIGT-X9ctYVvfYXw_ldo5XGguNv5j-zDiGBPrCVU";



const supabaseClient = supabase.createClient(

SUPABASE_URL,

SUPABASE_ANON_KEY

);



let currentUser = null;

let profile = null;





// ==========================================
// INITIALIZE APP
// ==========================================


async function initialize(){



const {data,error} = await supabaseClient.auth.getUser();



if(error){

console.error(error);

return;

}



if(!data.user){

window.location.href="login.html";

return;

}



currentUser = data.user;



await loadProfile();

await loadStories();

await loadFeed();

await loadTrending();

await loadSuggested();



listenForRealtime();



}
// ==========================================
// LOAD PROFILE
// ==========================================


async function loadProfile(){


const {data,error} = await supabaseClient

.from("profiles")

.select("*")

.eq("id",currentUser.id)

.single();



if(error){

console.error(error);

return;

}



profile = data;



const avatar = document.getElementById("profileAvatar");

const createAvatar = document.getElementById("createAvatar");



const avatarHTML = data.avatar_url

?

`

<img

src="${data.avatar_url}"

style="width:100%;height:100%;object-fit:cover;"

>

`

:

`

${(data.display_name || "R").charAt(0)}

`;



avatar.innerHTML = avatarHTML;

createAvatar.innerHTML = avatarHTML;



}





// ==========================================
// LOAD STORIES
// ==========================================


async function loadStories(){


const {data,error} = await supabaseClient

.from("profiles")

.select("*")

.order(

"follower_count",

{

ascending:false

}

)

.limit(15);



if(error){

console.error(error);

return;

}



const container = document.getElementById(

"storiesContainer"

);



container.innerHTML = "";




data.forEach(user => {



container.innerHTML += `



<div class="story">


<div class="story-border">


<div class="story-avatar">



${

user.avatar_url

?

`

<img

src="${user.avatar_url}"

style="width:100%;height:100%;object-fit:cover;"

>

`

:

`

${user.display_name.charAt(0)}

`

}



</div>


</div>



<div class="story-name">

${user.display_name}

</div>



</div>



`;



});



}






// ==========================================
// LOAD FEED
// ==========================================


async function loadFeed(){


const {data,error} = await supabaseClient

.from("social_feed")

.select("*")

.order(

"created_at",

{

ascending:false

}

);



if(error){

console.error(error);

return;

}



const container = document.getElementById(

"feedContainer"

);



container.innerHTML = "";




for(const post of data){



container.innerHTML += `



<div class="card post-card">



<div class="post-header">



<div class="post-user">



<div class="post-avatar">



${

post.avatar_url

?

`

src="${post.avatar_url}"

style="width:100%;height:100%;object-fit:cover;"

>

`

:

`

${post.display_name.charAt(0)}

`

}



</div>





<div>



<div class="post-name">


${post.display_name}



${

post.verified

?

`

<span class="verified-badge">

Verified

</span>

`

:

""

}



</div>



<div class="post-meta">

@${post.username}

</div>



</div>



</div>





<div class="post-menu">

•••

</div>



</div>





<div class="post-text">


${post.caption || ""}



</div>





<div

class="post-media"

id="media-${post.id}">


</div>






<div class="post-actions">



<button

class="action-button"

onclick="toggleLike('${post.id}')"

>


Like ${post.likes_count || 0}


</button>





<button class="action-button">


Comment ${post.comments_count || 0}


</button>





<button class="action-button">


Repost ${post.reposts_count || 0}


</button>



</div>



</div>



`;



await loadMedia(post.id);



}



}
// ==========================================
// LOAD POST MEDIA
// ==========================================


async function loadMedia(postId){


const {data,error} = await supabaseClient

.from("social_post_media")

.select("*")

.eq("post_id",postId)

.order("position");



if(error){

console.error(error);

return;

}



const container = document.getElementById(

`media-${postId}`

);



if(!container)return;



if(!data || data.length === 0){

container.style.display = "none";

return;

}



data.forEach(media => {



const {data:urlData} = supabaseClient.storage

.from("post-media")

.getPublicUrl(

media.storage_path

);



const url = urlData.publicUrl;





if(media.media_type === "image"){



container.innerHTML += `



<img

src="${url}"

loading="lazy"

>



`;



}





if(media.media_type === "video"){



container.innerHTML += `



<video

controls

playsinline

preload="metadata"

>


<source src="${url}">


</video>



`;



}



});



}







// ==========================================
// LIKE SYSTEM
// ==========================================


async function toggleLike(postId){



const {data:userData} = await supabaseClient.auth.getUser();



const userId = userData.user.id;





const {data:existing} = await supabaseClient

.from("post_likes")

.select("id")

.eq("post_id",postId)

.eq("user_id",userId)

.maybeSingle();





if(existing){



await supabaseClient

.from("post_likes")

.delete()

.eq(

"id",

existing.id

);



}

else{



await supabaseClient

.from("post_likes")

.insert({


post_id:postId,


user_id:userId



});



}



await loadFeed();



}







// ==========================================
// CREATE POST
// ==========================================


document

.getElementById("publishPost")

.addEventListener(

"click",

publishPost

);






async function publishPost(){



const input = document.getElementById(

"createPostInput"

);



const caption = input.value.trim();





if(!caption)return;





const {error} = await supabaseClient

.from("social_posts")

.insert({


user_id:currentUser.id,


caption:caption



});





if(error){


console.error(error);


return;


}





input.value = "";



await loadFeed();



}






// ==========================================
// TRENDING
// ==========================================


async function loadTrending(){



const {data,error} = await supabaseClient

.from("social_feed")

.select("caption")

.limit(8);





if(error)return;





const container = document.getElementById(

"trendingContainer"

);



container.innerHTML = "";





data.forEach(post => {



container.innerHTML += `



<div class="trending-item">



<h4>

${

(post.caption || "New Relvia post")

.substring(0,45)

}



</h4>



<p>

Trending on Relvia

</p>



</div>



`;



});



}
// ==========================================

const {data,error} = await supabaseClient

if(error){

}

);

data.forEach(user => {

<div class="creator-card">

<div class="creator-avatar">



${

user.avatar_url

?

`

:

// SEARCH USERS
// ==========================================


document

.getElementById("searchInput")

.addEventListener(

"input",

async(event)=>{



const value = event.target.value.trim();





if(value.length < 2)return;





const {data,error} = await supabaseClient

.from("profiles")

.select("*")

.ilike(

"display_name",

`%${value}%`

)

.limit(8);





if(error){

console.error(error);

return;

}





console.log(

"Search Results:",

data

);



}

);

supabaseClient

.channel("relvia-social-feed")

.on(

"postgres_changes",

{


event:"*",


schema:"public",


table:"social_posts"



},


(payload)=>{



console.log(

"Feed Updated",

payload

);



loadFeed();



}



)

.subscribe();



}
