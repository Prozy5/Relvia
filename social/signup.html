<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relvia Signup</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;

}



:root{

--bg:#050505;

--surface:#101010;

--surface-light:#171717;

--border:#252525;

--gold:#d4af37;

--text:#ffffff;

--muted:#8a8a8a;

}



body{


height:100vh;


background:

radial-gradient(

circle at top,

#1b1b1b,

#050505 45%

);


display:flex;

align-items:center;

justify-content:center;


color:white;


}





.signup-container{


width:450px;


background:rgba(16,16,16,.92);


border:1px solid var(--border);


border-radius:28px;


padding:40px;


backdrop-filter:blur(20px);


}




.logo{


text-align:center;


font-size:34px;


font-weight:800;


letter-spacing:4px;


margin-bottom:10px;


}



.logo span{


color:var(--gold);


}




.subtitle{


text-align:center;


color:var(--muted);


font-size:14px;


margin-bottom:35px;


}





.input-group{


margin-bottom:16px;


}



.input-group label{


display:block;


font-size:13px;


color:#bbb;


margin-bottom:8px;


}





.input-group input{


width:100%;


height:48px;


background:#171717;


border:1px solid var(--border);


border-radius:14px;


padding:0 16px;


color:white;


font-size:15px;


}



.input-group input:focus{


border-color:var(--gold);


outline:none;


}





.signup-button{


width:100%;


height:50px;


border:none;


border-radius:16px;


background:var(--gold);


color:black;


font-weight:800;


font-size:16px;


margin-top:10px;


cursor:pointer;


}



.signup-button:hover{


opacity:.9;


}




.back-button{


width:100%;


height:48px;


margin-top:14px;


border-radius:16px;


border:1px solid var(--border);


background:transparent;


color:white;


font-weight:600;


cursor:pointer;


}



.back-button:hover{


background:var(--surface-light);


}





.message{


text-align:center;


margin-top:18px;


font-size:14px;


color:#ff7777;


}



</style>
</head>


<body>



<div class="signup-container">



<div class="logo">

RELVIA <span>SIGNUP</span>

</div>



<div class="subtitle">

Create your Relvia account

</div>






<div class="input-group">


<label>

Display Name

</label>


<input

type="text"

id="displayName"

placeholder="Your name"

>


</div>






<div class="input-group">


<label>

Username

</label>


<input

type="text"

id="username"

placeholder="Choose a username"

>


</div>






<div class="input-group">


<label>

Email

</label>


<input

type="email"

id="email"

placeholder="Enter your email"

>


</div>






<div class="input-group">


<label>

Password

</label>


<input

type="password"

id="password"

placeholder="Create a password"

>


</div>







<button

class="signup-button"

id="signupButton">

Create Account

</button>







<button

class="back-button"

id="backButton">

Already have an account? Login

</button>







<div

class="message"

id="message">

</div>




</div>







<script>


// ==========================================
// SUPABASE CONNECTION
// ==========================================



const SUPABASE_URL = "https://nqcbhpqzzwjgkusfbexo.supabase.co";


const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xY2JocHF6endqZ2t1c2ZiZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjY1NjEsImV4cCI6MjA5ODk0MjU2MX0.BphyIGT-X9ctYVvfYXw_ldo5XGguNv5j-zDiGBPrCVU";



const supabaseClient = supabase.createClient(

SUPABASE_URL,

SUPABASE_ANON_KEY

);







// ==========================================
// CREATE ACCOUNT
// ==========================================



document

.getElementById("signupButton")

.addEventListener(

"click",

async()=>{





const displayName = document

.getElementById("displayName")

.value.trim();





const username = document

.getElementById("username")

.value.trim();





const email = document

.getElementById("email")

.value.trim();





const password = document

.getElementById("password")

.value;





const message = document

.getElementById("message");





message.innerHTML = "";






if(!displayName || !username || !email || !password){


message.innerHTML = "Please fill out all fields.";


return;


}







const {data,error} = await supabaseClient.auth.signUp({



email,


password,



options:{


data:{


display_name:displayName,


username:username



}



}



});






if(error){


message.innerHTML = error.message;


return;


}







const user = data.user;







if(user){



const {error:profileError} = await supabaseClient

.from("profiles")

.insert({


id:user.id,


display_name:displayName,


username:username,


avatar_url:null



});







if(profileError){



console.error(profileError);



message.innerHTML = profileError.message;



return;



}



}







window.location.href="social.html";




}

);







// ==========================================
// BACK TO LOGIN
// ==========================================



document

.getElementById("backButton")

.addEventListener(

"click",

()=>{


window.location.href="login.html";


}

);



</script>


</body>

</html>
