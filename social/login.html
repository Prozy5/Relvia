<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relvia Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;

}



:root{

--bg:#050505;

--surface:#101010;

--surface-light:#171717;

--border:#252525;

--gold:#d4af37;

--text:#ffffff;

--muted:#8a8a8a;

}



body{

height:100vh;

background:

radial-gradient(

circle at top,

#1a1a1a,

#050505 45%

);

display:flex;

align-items:center;

justify-content:center;

color:white;

}




.login-container{

width:420px;

background:rgba(16,16,16,.92);

border:1px solid var(--border);

border-radius:28px;

padding:40px;

backdrop-filter:blur(20px);

}



.logo{

text-align:center;

font-size:34px;

font-weight:800;

letter-spacing:4px;

margin-bottom:10px;

}



.logo span{

color:var(--gold);

}



.subtitle{

text-align:center;

color:var(--muted);

font-size:14px;

margin-bottom:35px;

}



.input-group{

margin-bottom:18px;

}



.input-group label{

display:block;

font-size:13px;

color:#bbb;

margin-bottom:8px;

}



.input-group input{

width:100%;

height:48px;

background:#171717;

border:1px solid var(--border);

border-radius:14px;

padding:0 16px;

color:white;

font-size:15px;

}



.input-group input:focus{

border-color:var(--gold);

outline:none;

}




.login-button{

width:100%;

height:50px;

border:none;

border-radius:16px;

background:var(--gold);

color:black;

font-weight:800;

font-size:16px;

margin-top:10px;

cursor:pointer;

}



.login-button:hover{

opacity:.9;

}




.divider{

display:flex;

align-items:center;

gap:12px;

margin:25px 0;

color:#555;

font-size:12px;

}



.divider::before,
.divider::after{

content:"";

height:1px;

background:var(--border);

flex:1;

}



.secondary-button{

width:100%;

height:48px;

border-radius:16px;

border:1px solid var(--border);

background:transparent;

color:white;

font-weight:600;

cursor:pointer;

}



.secondary-button:hover{

background:var(--surface-light);

}



.message{

text-align:center;

font-size:14px;

margin-top:18px;

color:#ff7777;

}



</style>
</head>


<body>



<div class="login-container">



<div class="logo">

RELVIA <span>LOGIN</span>

</div>



<div class="subtitle">

Welcome back to Relvia

</div>





<div class="input-group">


<label>

Email

</label>


<input

type="email"

id="email"

placeholder="Enter your email"

>



</div>





<div class="input-group">


<label>

Password

</label>


<input

type="password"

id="password"

placeholder="Enter your password"

>



</div>





<button

class="login-button"

id="loginButton">

Login

</button>





<div class="divider">

OR

</div>





<button

class="secondary-button"

id="signupButton">

Create Account

</button>





<div

class="message"

id="message">

</div>



</div>







<script>


// ==========================================
// SUPABASE CONNECTION
// ==========================================


const SUPABASE_URL = "https://nqcbhpqzzwjgkusfbexo.supabase.co";


const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xY2JocHF6endqZ2t1c2ZiZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjY1NjEsImV4cCI6MjA5ODk0MjU2MX0.BphyIGT-X9ctYVvfYXw_ldo5XGguNv5j-zDiGBPrCVU";



const supabaseClient = supabase.createClient(

SUPABASE_URL,

SUPABASE_ANON_KEY

);







// ==========================================
// LOGIN
// ==========================================


document

.getElementById("loginButton")

.addEventListener(

"click",

async()=>{



const email = document

.getElementById("email")

.value;



const password = document

.getElementById("password")

.value;





const message = document

.getElementById("message");





message.innerHTML = "";





const {data,error} = await supabaseClient.auth.signInWithPassword({


email,


password



});





if(error){



message.innerHTML = error.message;


return;



}





window.location.href = "social.html";



}

);







// ==========================================
// CREATE ACCOUNT
// ==========================================


document

.getElementById("signupButton")

.addEventListener(

"click",

()=>{



window.location.href = "signup.html";



}

);





</script>



</body>

</html>
