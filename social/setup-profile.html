<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Complete Your Relvia Profile</title>


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<style>


*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:"Inter",sans-serif;

}



:root{

--bg:#050505;

--surface:#101010;

--surface-light:#171717;

--border:#252525;

--gold:#d4af37;

--text:#ffffff;

--muted:#8a8a8a;

}



body{


min-height:100vh;


background:

radial-gradient(

circle at top,

#1c1c1c,

#050505 50%

);


color:white;


display:flex;

justify-content:center;

padding:40px 20px;


}






.setup-container{


width:700px;


background:rgba(16,16,16,.95);


border:1px solid var(--border);


border-radius:30px;


padding:40px;


}




.logo{


text-align:center;


font-size:32px;


font-weight:800;


letter-spacing:4px;


}



.logo span{


color:var(--gold);


}




.subtitle{


text-align:center;


color:var(--muted);


margin-top:10px;


margin-bottom:35px;


}






.avatar-section{


display:flex;


justify-content:center;


margin-bottom:30px;


}




.avatar-preview{


width:120px;


height:120px;


border-radius:50%;


background:#222;


border:3px solid var(--gold);


overflow:hidden;


display:flex;


align-items:center;


justify-content:center;


font-size:40px;


font-weight:700;


}




.avatar-preview img{


width:100%;


height:100%;


object-fit:cover;


}





.upload-button{


margin-top:15px;


display:block;


text-align:center;


color:var(--gold);


cursor:pointer;


font-size:14px;


}





.input-group{


margin-bottom:20px;


}



label{


display:block;


font-size:14px;


color:#ccc;


margin-bottom:8px;


}




input,
textarea{


width:100%;


background:#171717;


border:1px solid var(--border);


border-radius:16px;


padding:14px;


color:white;


font-size:15px;


}



textarea{


height:120px;


resize:none;


}






.section-title{


font-size:18px;


font-weight:700;


margin:30px 0 15px;


}






.labels-container{


display:flex;


flex-wrap:wrap;


gap:10px;


}



.label-option{


padding:10px 16px;


border-radius:999px;


background:#171717;


border:1px solid var(--border);


cursor:pointer;


color:#ccc;


transition:.2s;


}



.label-option.active{


background:var(--gold);


color:black;


font-weight:700;


}




.save-button{


width:100%;


height:52px;


margin-top:35px;


border:none;


border-radius:18px;


background:var(--gold);


color:black;


font-size:16px;


font-weight:800;


cursor:pointer;


}



.message{


text-align:center;


margin-top:18px;


color:#ff7777;


}



</style>
</head>


<body>



<div class="setup-container">



<div class="logo">

RELVIA <span>PROFILE</span>

</div>



<div class="subtitle">

Introduce yourself to the Relvia community

</div>





<div class="avatar-section">



<div>


<div

class="avatar-preview"

id="avatarPreview">

R

</div>



<label

class="upload-button"

for="avatarUpload">

Upload Profile Picture

</label>



<input

type="file"

id="avatarUpload"

accept="image/*"

hidden>



</div>



</div>







<div class="input-group">


<label>

Display Name

</label>


<input

id="displayName"

placeholder="Your name"

>


</div>







<div class="input-group">


<label>

Username

</label>


<input

id="username"

placeholder="@username"

>


</div>







<div class="input-group">


<label>

Bio

</label>


<textarea

id="bio"

placeholder="Tell Relvia who you are..."

></textarea>


</div>








<div class="section-title">

What describes you?

</div>






<div

class="labels-container"

id="labelsContainer">



<div class="label-option">

Filmmaker

</div>


<div class="label-option">

Director

</div>


<div class="label-option">

Producer

</div>


<div class="label-option">

Actor

</div>


<div class="label-option">

Music Artist

</div>


<div class="label-option">

Entertainer

</div>


<div class="label-option">

Content Creator

</div>


<div class="label-option">

Photographer

</div>


<div class="label-option">

Writer

</div>


<div class="label-option">

Designer

</div>


<div class="label-option">

Animator

</div>


<div class="label-option">

Studio

</div>


<div class="label-option">

Brand

</div>


<div class="label-option">

Journalist

</div>


<div class="label-option">

Developer

</div>


<div class="label-option">

Fan

</div>



</div>







<button

class="save-button"

id="saveProfile">

Complete Profile

</button>





<div

class="message"

id="message">

</div>





</div>








<script>


const SUPABASE_URL = "YOUR_SUPABASE_URL";


const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";



const supabaseClient = supabase.createClient(

SUPABASE_URL,

SUPABASE_ANON_KEY

);






let selectedLabels = [];

let avatarFile = null;

let currentUser = null;







// ==========================================
// CHECK USER
// ==========================================


async function initialize(){



const {data,error} = await supabaseClient.auth.getUser();





if(error || !data.user){



window.location.href="login.html";


return;



}





currentUser = data.user;





loadExistingProfile();



}








// ==========================================
// LOAD PROFILE DATA
// ==========================================


async function loadExistingProfile(){



const {data,error} = await supabaseClient

.from("profiles")

.select("*")

.eq(

"id",

currentUser.id

)

.single();





if(error)return;





if(data){



document.getElementById("displayName").value =

data.display_name || "";





document.getElementById("username").value =

data.username || "";





document.getElementById("bio").value =

data.bio || "";





if(data.avatar_url){



document.getElementById("avatarPreview").innerHTML = `



<img src="${data.avatar_url}">



`;



}



}



}







// ==========================================
// AVATAR PREVIEW
// ==========================================


document

.getElementById("avatarUpload")

.addEventListener(

"change",

(event)=>{



avatarFile = event.target.files[0];





if(!avatarFile)return;





const reader = new FileReader();





reader.onload = ()=>{



document.getElementById("avatarPreview").innerHTML = `



<img src="${reader.result}">


`;



};





reader.readAsDataURL(avatarFile);



}

);







// ==========================================
// LABEL SELECT
// ==========================================


document

.querySelectorAll(".label-option")

.forEach(label=>{



label.addEventListener(

"click",

()=>{



label.classList.toggle("active");





const value = label.innerText;





if(selectedLabels.includes(value)){



selectedLabels = selectedLabels.filter(

item=>item !== value

);



}

else{



selectedLabels.push(value);



}



}

);



});
// ==========================================
// SAVE PROFILE
// ==========================================


document

.getElementById("saveProfile")

.addEventListener(

"click",

saveProfile

);





async function saveProfile(){



const button = document.getElementById("saveProfile");

const message = document.getElementById("message");





button.innerText = "Saving...";

button.disabled = true;





const displayName = document

.getElementById("displayName")

.value

.trim();





const username = document

.getElementById("username")

.value

.trim()

.replace("@","");





const bio = document

.getElementById("bio")

.value

.trim();







if(!displayName || !username){



message.innerText = "Please complete your name and username.";

button.innerText = "Complete Profile";

button.disabled = false;

return;



}









let avatarURL = null;







// ==========================================
// UPLOAD AVATAR
// ==========================================



if(avatarFile){



const fileExtension = avatarFile.name.split(".").pop();



const filePath = 

`${currentUser.id}/avatar.${fileExtension}`;





const {error:uploadError} = await supabaseClient

.storage

.from("avatars")

.upload(

filePath,

avatarFile,

{

upsert:true

}

);





if(uploadError){



console.error(uploadError);

message.innerText = "Avatar upload failed.";

button.innerText = "Complete Profile";

button.disabled = false;

return;



}







const {data:urlData} = supabaseClient

.storage

.from("avatars")

.getPublicUrl(filePath);





avatarURL = urlData.publicUrl;



}









// ==========================================
// UPDATE PROFILE TABLE
// ==========================================



const {error} = await supabaseClient

.from("profiles")

.upsert({



id:currentUser.id,


display_name:displayName,


username:username,


bio:bio,


avatar_url:avatarURL,


labels:selectedLabels,


profile_complete:true



});







if(error){



console.error(error);


message.innerText = error.message;


button.innerText = "Complete Profile";

button.disabled = false;


return;



}







message.style.color = "#d4af37";


message.innerText = "Profile completed!";







setTimeout(()=>{



window.location.href="/social/feed.html";



},1000);





}







// ==========================================
// START
// ==========================================


initialize();



</script>


</body>

</html>
